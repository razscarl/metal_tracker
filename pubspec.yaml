name: metal_tracker

description: Track precious metal holdings with real-world valuations
publish_to: 'none'
version: 0.1.2+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # HTTP & Web Scraping
  http: ^1.2.0
  html: ^0.15.4
  
  # UI Components
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/